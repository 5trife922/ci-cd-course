<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Задачи</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="bg" aria-hidden="true"></div>
    <main class="shell">
      <header class="head">
        <h1 class="title">Задачи</h1>
        <p class="subtitle" id="subtitle">Мой список задач</p>
      </header>

      <form class="composer" id="form" autocomplete="off">
        <input
          class="input"
          id="input"
          name="title"
          maxlength="500"
          placeholder="Что сделать?"
          required
        />
        <button class="btn btn-primary" type="submit">Добавить</button>
      </form>

      <p class="hint" id="empty" hidden>Пока пусто — добавьте первую задачу</p>
      <ul class="list" id="list"></ul>
    </main>
    <script src="app.js"></script>
  </body>
</html>

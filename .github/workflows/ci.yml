name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: node.js install
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint
  unit-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: node.js install
        uses: actions/setup-node@v4
        with:
          node-version:
      
      - name: install dependencies
        run: npm ci

      - name: jest unit-tests
        run: npm run test:unit

  integrations-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: node.js install
        uses: actions/setup-node@v4
        with:
          node-version:
      
      - name: install dependencies
        run: npm ci

      - name: jest integration-tests
        run: npm run test:integration

  e2e-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: node.js install
        uses: actions/setup-node@v4
        with:
          node-version:
      
      - name: install dependencies
        run: npm ci

      - name: install playwright
        run: node ./node_modules/@playwright/test/cli.js install --with-deps chromium
      
      - name: e2e
        run: npm run test:e2e
  
  ci-summary:
    name: ИТОГ
    runs-on: ubuntu-latest
    needs: [lint, unit-test, integrations-test, e2e-test]
    if: always()
    steps:
     - name: msg
       run: |
        l="${{ needs.lint.result }}"
        u="${{ needs.unit-test.result }}"
        i="${{ needs.integrations-test.result }}"
        e="${{ needs.e2e-test.result }}"
        echo "lint=$l test-unit=$u test-integration=$i e2e=$e"
          if [ "$l" = "success" ] && [ "$u" = "success" ] && \
             [ "$i" = "success" ] && [ "$e" = "success" ]; then
            echo "::notice title=CI успешно::Все проверки завершены успешно: ESLint, unit-тесты, интеграционные тесты, e2e."
            exit 0
          fi
          echo "::error title=CI не прошёл::Одна или несколько проверок завершились с ошибкой или были отменены."
          exit 1
name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint

  test-unit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Jest (unit)
        run: npm run test:unit

  test-integration:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Jest (integration)
        run: npm run test:integration

  e2e:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: node ./node_modules/@playwright/test/cli.js install --with-deps chromium

      - name: Playwright (e2e)
        run: npm run test:e2e

  ci-summary:
    name: Итог CI
    runs-on: ubuntu-latest
    needs: [lint, test-unit, test-integration, e2e]
    if: always()
    steps:
      - name: Сообщение о результате
        run: |
          l="${{ needs.lint.result }}"
          u="${{ needs.test-unit.result }}"
          i="${{ needs.test-integration.result }}"
          e="${{ needs.e2e.result }}"
          echo "lint=$l test-unit=$u test-integration=$i e2e=$e"
          if [ "$l" = "success" ] && [ "$u" = "success" ] && \
             [ "$i" = "success" ] && [ "$e" = "success" ]; then
            echo "::notice title=CI успешно::Все проверки завершены успешно: ESLint, unit-тесты, интеграционные тесты, e2e."
            exit 0
          fi
          echo "::error title=CI не прошёл::Одна или несколько проверок завершились с ошибкой или были отменены."
          exit 1
